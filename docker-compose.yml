version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cartridge_cast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - postgres

volumes:
  postgres_data:
